<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Puzzle Deslizante</title>

<style>
    *{
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        margin:0;
        background:#111827;
        color:white;
        display:flex;
        justify-content:center;
        padding:30px;
    }

    .container{
        width:100%;
        max-width:900px;
    }

    h1{
        margin-top:0;
        text-align:center;
    }

    .controls{
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        align-items:end;
        margin-bottom:20px;
    }

    .controls div{
        display:flex;
        flex-direction:column;
        gap:5px;
    }

    input{
        padding:10px;
        border:none;
        border-radius:8px;
        width:90px;
        font-size:16px;
    }

    button{
        border:none;
        padding:12px 16px;
        border-radius:10px;
        cursor:pointer;
        font-weight:bold;
        transition:0.2s;
    }

    button:hover{
        transform:scale(1.03);
    }

    .generate{
        background:#22c55e;
        color:white;
    }

    .reset{
        background:#ef4444;
        color:white;
    }

    .times{
        background:#3b82f6;
        color:white;
    }

    .stats{
        display:flex;
        gap:20px;
        margin-bottom:20px;
        font-size:18px;
        flex-wrap:wrap;
    }

    #board{
        display:grid;
        gap:6px;
        width:fit-content;
        margin:auto;
        background:#1f2937;
        padding:8px;
        border-radius:16px;
    }

    .tile{
        width:70px;
        height:70px;
        background:#2563eb;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:24px;
        font-weight:bold;
        border-radius:12px;
        cursor:pointer;
        user-select:none;
        transition:0.15s;
    }

    .tile:hover{
        transform:scale(1.04);
    }

    .empty{
        background:transparent;
        cursor:default;
    }

    .modal{
        position:fixed;
        inset:0;
        background:rgba(0,0,0,0.7);
        display:none;
        align-items:center;
        justify-content:center;
        padding:20px;
    }

    .modal-content{
        background:#1f2937;
        width:100%;
        max-width:600px;
        border-radius:16px;
        padding:20px;
    }

    .history-item{
        background:#111827;
        padding:12px;
        border-radius:10px;
        margin-bottom:10px;
    }

    .close{
        margin-top:15px;
        background:#ef4444;
        color:white;
        width:100%;
    }

    .winner{
        margin-top:15px;
        text-align:center;
        color:#22c55e;
        font-size:22px;
        font-weight:bold;
    }
</style>
</head>

<body>

<div class="container">

    <h1>Puzzle Deslizante</h1>

    <div class="controls">

        <div>
            <label>Quadrados X</label>
            <input type="number" id="sizeX" min="2" max="10" value="3">
        </div>

        <div>
            <label>Quadrados Y</label>
            <input type="number" id="sizeY" min="2" max="10" value="3">
        </div>

        <button class="generate" onclick="generateBoard()">
            Gerar
        </button>

        <button class="reset" onclick="resetGame()">
            Resetar
        </button>

        <button class="times" onclick="openTimes()">
            Tempos
        </button>

    </div>

    <div class="stats">
        <div>⏱ Tempo: <span id="time">00:00</span></div>
        <div>🎮 Jogadas: <span id="moves">0</span></div>
    </div>

    <div id="board"></div>

    <div class="winner" id="winner"></div>

</div>

<div class="modal" id="timesModal">
    <div class="modal-content">
        <h2>Tempos Finalizados</h2>

        <div id="history"></div>

        <button class="close" onclick="closeTimes()">
            Fechar
        </button>
    </div>
</div>

<script>

let board = []
let rows = 3
let cols = 3
let moves = 0
let seconds = 0
let timer = null
let started = false
let gameFinished = false

const boardEl = document.getElementById("board")
const movesEl = document.getElementById("moves")
const timeEl = document.getElementById("time")
const winnerEl = document.getElementById("winner")

function generateBoard(){

    rows = parseInt(document.getElementById("sizeY").value)
    cols = parseInt(document.getElementById("sizeX").value)

    const total = rows * cols

    // cria tabuleiro resolvido
    board = []

    for(let i = 1; i < total; i++){
        board.push(i)
    }

    board.push(null)

    // embaralha de forma válida
    do{
        shuffle(board)
    }while(
        isSolved(board) ||
        !isSolvable(board, rows, cols)
    )

    moves = 0
    seconds = 0
    started = false
    winnerEl.textContent = ""
    gameFinished = false

    clearInterval(timer)

    updateStats()
    renderBoard()
}

function resetGame(){
    generateBoard()
}

function renderBoard(){

    boardEl.innerHTML = ""

    boardEl.style.gridTemplateColumns = `repeat(${cols}, 70px)`

    board.forEach((value, index) => {

        const tile = document.createElement("div")

        tile.className = "tile"

        if(value === null){
            tile.classList.add("empty")
        }else{
            tile.textContent = value
            tile.onclick = () => moveTile(index)
        }

        boardEl.appendChild(tile)

    })

}

function moveTile(index){

    if(gameFinished) return

    const emptyIndex = board.indexOf(null)

    const tileRow = Math.floor(index / cols)
    const tileCol = index % cols

    const emptyRow = Math.floor(emptyIndex / cols)
    const emptyCol = emptyIndex % cols

    let moved = false

    // mesma linha
    if(tileRow === emptyRow){

        // vazio à direita
        if(tileCol < emptyCol){

            for(let i = emptyCol; i > tileCol; i--){

                board[tileRow * cols + i] =
                    board[tileRow * cols + (i - 1)]

            }

            board[index] = null
            moved = true
        }

        // vazio à esquerda
        else if(tileCol > emptyCol){

            for(let i = emptyCol; i < tileCol; i++){

                board[tileRow * cols + i] =
                    board[tileRow * cols + (i + 1)]

            }

            board[index] = null
            moved = true
        }

    }

    // mesma coluna
    else if(tileCol === emptyCol){

        // vazio abaixo
        if(tileRow < emptyRow){

            for(let i = emptyRow; i > tileRow; i--){

                board[i * cols + tileCol] =
                    board[(i - 1) * cols + tileCol]

            }

            board[index] = null
            moved = true
        }

        // vazio acima
        else if(tileRow > emptyRow){

            for(let i = emptyRow; i < tileRow; i++){

                board[i * cols + tileCol] =
                    board[(i + 1) * cols + tileCol]

            }

            board[index] = null
            moved = true
        }

    }

    if(!moved) return

    if(!started){
        startTimer()
        started = true
    }

    moves++

    updateStats()

    renderBoard()

    if(isSolved(board)){

        clearInterval(timer)
        gameFinished = true

        winnerEl.textContent = "🎉 Puzzle Completo!"

        saveTime()
    }
}

function isAdjacent(a, b){

    const ax = a % cols
    const ay = Math.floor(a / cols)

    const bx = b % cols
    const by = Math.floor(b / cols)

    return (
        (Math.abs(ax - bx) === 1 && ay === by) ||
        (Math.abs(ay - by) === 1 && ax === bx)
    )
}

function shuffle(array){

    for(let i = array.length - 1; i > 0; i--){

        const j = Math.floor(Math.random() * (i + 1))

        ;[array[i], array[j]] = [array[j], array[i]]

    }

}

function isSolvable(arr, rows, cols){

    let inversions = 0

    const numbers = arr.filter(v => v !== null)

    // conta inversões
    for(let i = 0; i < numbers.length; i++){

        for(let j = i + 1; j < numbers.length; j++){

            if(numbers[i] > numbers[j]){
                inversions++
            }

        }

    }

    // largura ímpar
    if(cols % 2 !== 0){
        return inversions % 2 === 0
    }

    // largura par
    const emptyIndex = arr.indexOf(null)
    const emptyRowFromBottom = rows - Math.floor(emptyIndex / cols)

    if(emptyRowFromBottom % 2 === 0){
        return inversions % 2 !== 0
    }else{
        return inversions % 2 === 0
    }
}

function isSolved(arr){

    for(let i = 0; i < arr.length - 1; i++){

        if(arr[i] !== i + 1){
            return false
        }

    }

    return arr[arr.length - 1] === null
}

function updateStats(){

    movesEl.textContent = moves
    timeEl.textContent = formatTime(seconds)

}

function startTimer(){

    timer = setInterval(() => {

        seconds++
        updateStats()

    }, 1000)

}

function formatTime(sec){

    const m = String(Math.floor(sec / 60)).padStart(2, "0")
    const s = String(sec % 60).padStart(2, "0")

    return `${m}:${s}`
}

function saveTime(){

    const history = JSON.parse(localStorage.getItem("puzzleHistory") || "[]")

    history.push({
        board: `${cols}x${rows}`,
        time: formatTime(seconds),
        moves,
        timestamp: new Date().toLocaleString()
    })

    localStorage.setItem("puzzleHistory", JSON.stringify(history))

}

function openTimes(){

    const modal = document.getElementById("timesModal")
    const historyEl = document.getElementById("history")

    const history = JSON.parse(localStorage.getItem("puzzleHistory") || "[]")

    historyEl.innerHTML = ""

    if(history.length === 0){

        historyEl.innerHTML = "<p>Nenhum tempo salvo.</p>"

    }else{

        history
        .slice()
        .reverse()
        .forEach(item => {

            const div = document.createElement("div")

            div.className = "history-item"

            div.innerHTML = `
                <strong>Tabuleiro:</strong> ${item.board}<br>
                <strong>Tempo:</strong> ${item.time}<br>
                <strong>Jogadas:</strong> ${item.moves}<br>
                <strong>Data:</strong> ${item.timestamp}
            `

            historyEl.appendChild(div)

        })

    }

    modal.style.display = "flex"
}

function closeTimes(){
    document.getElementById("timesModal").style.display = "none"
}

generateBoard()

</script>

</body>
</html>
